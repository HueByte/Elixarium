<svg width="800" height="800" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="100%" height="100%" fill="#080808" />

    <!-- Sigil -->
    <g stroke="#E6C06E" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round">

        <!-- Outer Circle — continuity, lineage -->
        <circle cx="500" cy="500" r="420" />

        <!-- Middle Circle — mind, intellect -->
        <circle cx="500" cy="500" r="180" />

        <!-- Core Fire Triangle — will, transformation (replaces inner circle) -->
        <polygon points="500,440 550,532 450,532" fill="#E6C06E" />

        <!-- Vertical Axis — spine, inner strength (top only) -->
        <line x1="500" y1="80" x2="500" y2="320" />

        <!-- Three Dots around middle circle — knowledge, vigilance, balance -->
        <!-- Top-Left -->
        <circle cx="285" cy="390" r="8" fill="#E6C06E" />
        <!-- Top-Right -->
        <circle cx="715" cy="390" r="8" fill="#E6C06E" />
        <!-- Bottom (aligned with axis) -->
        <circle cx="500" cy="750" r="8" fill="#E6C06E" />

        <!-- Diagonal Strokes — pressure met with composure -->
        <!-- <line x1="280" y1="260" x2="350" y2="330" />
        <line x1="720" y1="260" x2="650" y2="330" />
        <line x1="350" y1="670" x2="280" y2="740" />
        <line x1="650" y1="670" x2="720" y2="740" /> -->

        <!-- Base anchor — grounding, endurance -->
        <!-- <line x1="440" y1="920" x2="560" y2="920" /> -->
    </g>
</svg>